schema_version: "1.0"
description: >
  Security intent registry for DNS Tool.
  Every SECINTENT tag in source code MUST have a matching entry here.
  Orphaned entries (no matching code tag) or missing entries (code tag
  without registry entry) cause the reconciliation check to fail.

intents:

  - id: SECINTENT-001
    title: "TLS skip-verify in SMTP transport analyzer"
    file: "go-server/internal/analyzer/smtp_transport.go"
    pattern: "InsecureSkipVerify:\\s*true"
    category: accepted-risk
    severity: medium
    justification: >
      The SMTP transport analyzer intentionally disables TLS certificate
      verification to probe mail server TLS configuration as a diagnostic
      tool. Certificate validation is performed independently in verifyCert().
    sonar_rules: ["go:S4830", "go:S5527"]
    owner: "security-team"
    approved_by: "carey-james"
    approved_date: "2025-01-15"
    expires: "2027-01-15"
    review_interval_days: 180

  - id: SECINTENT-002
    title: "TLS skip-verify in probe binary"
    file: "go-server/cmd/probe/main.go"
    pattern: "InsecureSkipVerify:\\s*true"
    category: accepted-risk
    severity: medium
    justification: >
      The probe binary is a security diagnostic tool that intentionally
      connects to arbitrary servers to inspect their TLS configuration.
      It must bypass certificate verification to test servers with
      self-signed, expired, or mismatched certificates.
    sonar_rules: ["go:S4830", "go:S5527"]
    owner: "security-team"
    approved_by: "carey-james"
    approved_date: "2025-01-15"
    expires: "2027-01-15"
    review_interval_days: 180

  - id: SECINTENT-003
    title: "Hardcoded DNS resolver IPs"
    file: "go-server/internal/dnsclient/**"
    pattern: "(?:\\d{1,3}\\.){3}\\d{1,3}"
    category: intentional-behavior
    severity: info
    justification: >
      Well-known public DNS resolver IPs (8.8.8.8, 1.1.1.1, 9.9.9.9, etc.)
      are intentional constants for the multi-resolver consensus architecture.
      These are documented, stable, public services — not secrets.
    sonar_rules: ["go:S1313"]
    owner: "dns-team"
    approved_by: "carey-james"
    approved_date: "2025-01-15"
    expires: "2027-01-15"
    review_interval_days: 365

  - id: SECINTENT-004
    title: "Empty stub bodies for open-core boundary"
    file: "stubs/**"
    pattern: "func.*\\{\\s*\\}"
    category: intentional-behavior
    severity: info
    justification: >
      OSS stubs for proprietary intel code intentionally have empty function
      bodies that return safe defaults. The real implementations live in
      the _intel.go counterparts (requires -tags intel build).
    sonar_rules: ["go:S1186"]
    owner: "architecture-team"
    approved_by: "carey-james"
    approved_date: "2025-01-15"
    expires: "2027-01-15"
    review_interval_days: 365

  - id: SECINTENT-005
    title: "Math.random for non-crypto UI purposes"
    file: "static/js/main.js"
    pattern: "Math\\.random\\(\\)"
    category: accepted-risk
    severity: low
    justification: >
      Math.random() is used for non-security UI purposes such as animation
      timing and visual randomization. Not used for cryptographic operations.
    sonar_rules: ["javascript:S2245"]
    owner: "frontend-team"
    approved_by: "carey-james"
    approved_date: "2025-01-15"
    expires: "2027-01-15"
    review_interval_days: 365

  - id: SECINTENT-006
    title: "DNS record test fixtures contain verification tokens"
    file: ".gitleaks.toml"
    pattern: "google-site-verification|facebook-domain-verification"
    category: test-fixture
    severity: info
    justification: >
      Golden fixture JSON files contain real DNS TXT record data including
      domain verification tokens. These are publicly available DNS records,
      not secrets. Gitleaks allowlist covers these patterns.
    sonar_rules: []
    owner: "testing-team"
    approved_by: "carey-james"
    approved_date: "2025-01-15"
    expires: "2027-01-15"
    review_interval_days: 365
