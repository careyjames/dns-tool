# AD0639176-snapshot.html is a frozen third-party U.S. government document snapshot
# (DTIC defense research citation page, saved via SingleFile). Not project code.
# Excluding eliminates 4 false-positive bugs (missing font family, duplicate height)
# and ~25 code smells from that preserved reference document.
sonar.exclusions=**/*_test.go,**/vendor/**,stubs/**,go-server/db/schema/**,go-server/internal/dbq/**,.cache/**,.pythonlibs/**,attached_assets/**,.scannerwork/**,**/*.py,.agents/**,node_modules/**,scripts/**,**/*.sql,go-server/static/references/AD0639176-snapshot.html,static/references/AD0639176-snapshot.html

sonar.tests=go-server
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out

sonar.coverage.exclusions=go-server/internal/dbq/**,go-server/cmd/server/main.go,go-server/cmd/probe/**,go-server/templates/**,go-server/tools/**,**/*.html,**/*.ts,**/*.js,**/*.css,**/*.json

sonar.sourceEncoding=UTF-8

