# --- Logging Handler Background Context ---
# S8239: discord.Send runs in a goroutine. The incoming ctx is request-scoped and
# will be cancelled when the handler returns, which would abort the async send.
# context.Background() is intentionally correct here.
sonar.issue.ignore.multicriteria.logHandlerCtx.ruleKey=godre:S8239
sonar.issue.ignore.multicriteria.logHandlerCtx.resourceKey=go-server/internal/logging/handler.go

# S8239: Agent search handlers intentionally use context.Background() instead of
# the request context. DEVONagent Pro has a connection timeout shorter than large
# domain analyses (e.g. yahoo.com with ~10k subdomains). A detached context with
# a 90-second timeout ensures the analysis completes and saves even if the client
# disconnects, so subsequent queries return cached results instantly.
sonar.issue.ignore.multicriteria.agentDetachedCtx.ruleKey=godre:S8239
sonar.issue.ignore.multicriteria.agentDetachedCtx.resourceKey=go-server/internal/handlers/agent.go

# --- Copy-Paste Detection (CPD) Exclusions ---
# Build-tag gated _intel.go/_oss.go file pairs must contain near-identical code
# to provide the same API surface under both build configurations. These are not
# copy-paste violations — they are structurally required by Go's build constraint system.
sonar.cpd.exclusions=go-server/internal/analyzer/*_intel.go,go-server/internal/analyzer/*_oss.go,go-server/internal/analyzer/ai_surface/*_intel.go,go-server/internal/analyzer/ai_surface/*_oss.go
