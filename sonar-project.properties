# --- TLS Skip Verify in SMTP Transport Analyzer ---
# S4830/S5527: The SMTP transport analyzer intentionally disables TLS certificate
# verification to probe mail server TLS configuration. Certificate validation is
# performed independently in verifyCert(). This is a security diagnostic tool.
sonar.issue.ignore.multicriteria.tlsSkipVerify.ruleKey=go:S4830
sonar.issue.ignore.multicriteria.tlsSkipVerify.resourceKey=go-server/internal/analyzer/smtp_transport.go
sonar.issue.ignore.multicriteria.tlsHostname.ruleKey=go:S5527
sonar.issue.ignore.multicriteria.tlsHostname.resourceKey=go-server/internal/analyzer/smtp_transport.go

