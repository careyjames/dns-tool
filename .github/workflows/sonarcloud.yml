name: SonarCloud Full Product Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.actor != 'dependabot[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run Go tests with coverage
        run: |
          go test ./go-server/... -tags intel \
            -skip 'NoIntelInPublicRepo|NoIntelLeakage|NoIntelStagingDirectory|BoundaryIntegrity_FullRepoScan|IsOriginVisible|EdgeCDNMapsEmpty|GoldenRuleStubBoundary|ScrutinyClassificationAllFiles' \
            -coverprofile=coverage.out -covermode=atomic -count=1 -short -timeout 300s -parallel=2
        env:
          CGO_ENABLED: '0'
          DNS_TOOL_REPO_ROLE: intel
          GOGC: '50'
          GOMEMLIMIT: '6000MiB'

      - name: Verify coverage completeness
        run: |
          echo "=== Coverage report summary ==="
          TOTAL_LINES=$(grep -c "^dnstool" coverage.out || echo 0)
          HANDLER_LINES=$(grep -c "go-server/internal/handlers/" coverage.out || echo 0)
          ANALYZER_LINES=$(grep -c "go-server/internal/analyzer/" coverage.out || echo 0)
          echo "Total coverage lines: $TOTAL_LINES"
          echo "Handler coverage lines: $HANDLER_LINES"
          echo "Analyzer coverage lines: $ANALYZER_LINES"

          if [ "$HANDLER_LINES" -lt 100 ]; then
            echo "::error::Handler coverage missing from coverage.out ($HANDLER_LINES lines found, expected 100+)"
            echo "Packages present:"
            grep "^dnstool" coverage.out | sed 's|:.*||' | sed 's|/[^/]*$||' | sort -u
            exit 1
          fi

          if [ "$ANALYZER_LINES" -lt 50 ]; then
            echo "::error::Analyzer coverage missing from coverage.out ($ANALYZER_LINES lines found, expected 50+)"
            echo "Packages present:"
            grep "^dnstool" coverage.out | sed 's|:.*||' | sed 's|/[^/]*$||' | sort -u
            exit 1
          fi

          echo "=== Per-package coverage ==="
          go tool cover -func=coverage.out | grep "^total:" || true

      - name: Normalize coverage paths for SonarCloud
        run: |
          echo "=== Before normalization ==="
          head -3 coverage.out
          sed -i 's|^dnstool/||' coverage.out
          echo "=== After normalization ==="
          head -3 coverage.out
          echo "Normalized $(wc -l < coverage.out) coverage lines"

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
