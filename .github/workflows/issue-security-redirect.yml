name: Security Issue Redirect
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  redirect:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'triage:security-redirect')
    steps:
      - name: Post private reporting instructions and close
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '## 🛡️ Security Report — Redirecting to Private Channel',
                '',
                'Thank you for reporting a potential security issue. This public issue',
                'has been **automatically closed** to protect vulnerability details.',
                '',
                '### Please report privately using one of these channels:',
                '',
                '| Channel | Link |',
                '| ------- | ---- |',
                '| **GitHub Security Advisory** | [Create Private Advisory](https://github.com/IT-Help-San-Diego/dns-tool/security/advisories/new) |',
                '| **Email** | [security@it-help.tech](mailto:security@it-help.tech) |',
                '| **security.txt** | [/.well-known/security.txt](https://dnstool.it-help.tech/.well-known/security.txt) |',
                '',
                '### Response Timeline',
                '',
                '- Acknowledgment: **3 business days**',
                '- Triage / status update: **10 business days**',
                '- Remediation: risk-based, dependent on complexity',
                '',
                'Our [Security Policy](https://dnstool.it-help.tech/security-policy) includes',
                'safe harbor provisions for good-faith security research.',
                '',
                '> — DNS Tool Security Triage'
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'not_planned'
            });

            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              lock_reason: 'resolved'
            });
