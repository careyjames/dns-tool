name: Issue Triage
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Research Mission Critical — validate and escalate
        if: contains(github.event.issue.labels.*.name, 'triage:research')
        uses: actions/github-script@v8
        with:
          script: |
            const MARKER = '<!-- dns-tool-triage-bot -->';
            const issueNumber = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100
            });
            if (comments.data.some(c => c.body && c.body.includes(MARKER))) {
              console.log('Triage comment already posted — skipping.');
              return;
            }

            const body = context.payload.issue.body || '';
            const missing = [];

            const sections = {};
            const sectionPattern = /### (.+?)\n\n([\s\S]*?)(?=\n### |\n*$)/g;
            let match;
            while ((match = sectionPattern.exec(body)) !== null) {
              sections[match[1].trim()] = match[2].trim();
            }

            const rfcSection = sections['RFC Reference'] || '';
            if (!rfcSection || rfcSection === 'RFC XXXX §X.X — [quote the relevant normative text]' || rfcSection.length < 10) {
              missing.push('RFC reference with specific section and normative text');
            }

            const expected = sections['Expected Behavior (per RFC)'] || sections['Expected Behavior'] || '';
            if (!expected || expected.startsWith('Per RFC XXXX') || expected.length < 20) {
              missing.push('Expected behavior with substantive description (not just placeholder)');
            }

            const observed = sections['Observed Behavior'] || '';
            if (!observed || observed.startsWith('When scanning domain X') || observed.length < 20) {
              missing.push('Observed behavior with concrete details');
            }

            const confidence = sections['Confidence Impact Assessment'] || '';
            if (!confidence || confidence.startsWith('This causes false') || confidence.length < 15) {
              missing.push('Confidence impact assessment');
            }

            if (missing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  MARKER,
                  '## \u26a0\ufe0f Research Mission Critical — Additional Detail Needed',
                  '',
                  'This issue is flagged as **Research Mission Critical** (P0) but appears to be missing substantive content in:',
                  '',
                  ...missing.map(m => `- [ ] ${m}`),
                  '',
                  'Please update the issue with the missing information so we can investigate immediately.',
                  '',
                  '> Research-critical issues require RFC-backed evidence for accurate triage.',
                  '> \u2014 DNS Tool Issue Triage'
                ].join('\n')
              });

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['triage/needs-information']
                });
              } catch (e) { console.log('Label add failed (may not exist yet):', e.message); }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  MARKER,
                  '## \ud83d\udea8 Research Mission Critical — Acknowledged',
                  '',
                  'This issue has been flagged as **Research Mission Critical (P0)**.',
                  'RFC-backed evidence has been detected. This will be investigated immediately.',
                  '',
                  'Thank you for the rigorous report.',
                  '',
                  '> \u2014 DNS Tool Issue Triage'
                ].join('\n')
              });

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'needs-triage'
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['triage/accepted']
                });
              } catch (e) { console.log('Label transition failed:', e.message); }
            }

      - name: Cosmetic UX/UI — acknowledge
        if: contains(github.event.issue.labels.*.name, 'triage:ux')
        uses: actions/github-script@v8
        with:
          script: |
            const MARKER = '<!-- dns-tool-triage-bot -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            if (comments.data.some(c => c.body && c.body.includes(MARKER))) {
              console.log('Triage comment already posted — skipping.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                MARKER,
                '## \ud83c\udfa8 UX/UI Issue — Acknowledged',
                '',
                'This has been categorized as a **Cosmetic / UX / UI** issue.',
                'It will be reviewed and addressed on our normal development cadence.',
                '',
                'If this turns out to affect accessibility (WCAG AA/AAA), it may be escalated.',
                '',
                '> \u2014 DNS Tool Issue Triage'
              ].join('\n')
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'needs-triage'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['triage/accepted']
              });
            } catch (e) { console.log('Label transition failed:', e.message); }

      - name: Security keyword scanner — catch misrouted vulnerability reports
        if: "!contains(github.event.issue.labels.*.name, 'triage:security-redirect')"
        uses: actions/github-script@v8
        with:
          script: |
            const MARKER = '<!-- dns-tool-security-scanner -->';
            const body = (context.payload.issue.body || '').toLowerCase();
            const title = (context.payload.issue.title || '').toLowerCase();
            const combined = title + ' ' + body;

            const securityKeywords = [
              'vulnerability', 'exploit', 'cve-', 'remote code execution',
              'sql injection', 'xss', 'cross-site', 'csrf', 'ssrf',
              'authentication bypass', 'privilege escalation', 'rce',
              'buffer overflow', 'command injection', 'path traversal',
              'directory traversal', 'insecure deserialization',
              'security flaw', 'zero-day', '0day', 'poc exploit'
            ];

            const matches = securityKeywords.filter(kw => combined.includes(kw));
            if (matches.length < 2) return;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            if (comments.data.some(c => c.body && c.body.includes(MARKER))) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                MARKER,
                '## \ud83d\udee1\ufe0f Possible Security Report Detected',
                '',
                'This issue appears to contain security-related content.',
                '**Please do not post vulnerability details in public issues.**',
                '',
                'If this is a security report, please:',
                '1. **Delete or edit** this issue to remove sensitive details',
                '2. Report privately via [GitHub Security Advisory](https://github.com/IT-Help-San-Diego/dns-tool-web/security/advisories/new)',
                '3. Or email [security@it-help.tech](mailto:security@it-help.tech)',
                '',
                'If this is NOT a security report (e.g., discussing security features or analysis results), you can ignore this message.',
                '',
                '> \u2014 DNS Tool Security Scanner'
              ].join('\n')
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-security-review']
            });
