name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Detect repo role
        id: role
        run: |
          if [[ "${{ github.repository }}" == *"-intel" ]]; then
            echo "is_intel=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_intel=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary (intel)
        if: steps.role.outputs.is_intel == 'true'
        run: |
          cd go-server
          CGO_ENABLED=0 go build -tags intel -ldflags "-s -w" -o ../dns-tool-server ./cmd/server
        env:
          DNS_TOOL_REPO_ROLE: intel

      - name: Run tests (intel)
        if: steps.role.outputs.is_intel == 'true'
        run: |
          go test ./go-server/... -tags intel \
            -skip 'NoIntelInPublicRepo|NoIntelLeakage|NoIntelStagingDirectory|BoundaryIntegrity_FullRepoScan|IsOriginVisible|EdgeCDNMapsEmpty|GoldenRuleStubBoundary|ScrutinyClassificationAllFiles' \
            -count=1 -short -timeout 300s -parallel=2
        env:
          CGO_ENABLED: '0'
          DNS_TOOL_REPO_ROLE: intel
          GOGC: '50'
          GOMEMLIMIT: '6000MiB'

      - name: Run tests (web — stub boundary only)
        if: steps.role.outputs.is_intel == 'false'
        run: |
          go vet ./go-server/internal/config/...
          echo "Web repo — full build requires intel packages. Vet + config passed."
        env:
          CGO_ENABLED: '0'

      - name: Verify binary
        if: steps.role.outputs.is_intel == 'true'
        run: |
          ls -lh dns-tool-server
          file dns-tool-server
