name: Guard CITATION.cff

on:
  pull_request:
    branches: [ main ]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assert CITATION.cff has correct SPDX license
        run: |
          set -euo pipefail
          grep -nE '^license:\s*"BUSL-1\.1"\s*$' CITATION.cff >/dev/null \
            || { echo "FAIL: CITATION.cff license must be BUSL-1.1 (SPDX)."; \
                 echo "Found:"; grep -n '^license:' CITATION.cff || true; exit 1; }

      - name: Validate CITATION.cff schema
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip cffconvert
          cffconvert --validate --infile CITATION.cff
