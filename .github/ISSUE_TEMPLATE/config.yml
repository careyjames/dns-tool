blank_issues_enabled: false
contact_links:
  - name: "\U0001F6E1\uFE0F Report a Security Vulnerability (Private)"
    url: https://github.com/IT-Help-San-Diego/dns-tool/security/advisories/new
    about: >
      Security vulnerabilities must be reported privately. Do NOT file a public
      issue. Use GitHub Security Advisories or email security@it-help.tech.
  - name: "\u2753 Ask a Question (Discussions)"
    url: https://github.com/IT-Help-San-Diego/dns-tool/discussions
    about: >
      For usage questions, feature ideas, or general discussion — use GitHub
      Discussions instead of filing an issue. Issues are for actionable bugs
      and validated research findings.
  - name: "\U0001F4D6 Read the Security Policy"
