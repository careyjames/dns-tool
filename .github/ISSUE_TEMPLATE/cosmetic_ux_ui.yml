name: "\U0001F3A8 Cosmetic / UX / UI"
description: >
  Visual bug, layout issue, accessibility problem, or user experience improvement.
title: "[UX] "
labels: ["triage:ux", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Cosmetic / UX / UI Issue

        This template is for visual bugs, layout problems, accessibility issues,
        and user experience improvements. These are important and will be addressed
        on a normal development cadence.

  - type: checkboxes
    id: duplicate_search
    attributes:
      label: Duplicate Check
      description: Please search existing issues before filing a new one.
      options:
        - label: I have searched the existing issues and this has not been reported
          required: true

  - type: dropdown
    id: page
    attributes:
      label: Affected Page
      description: Which page or feature is affected?
      options:
        - Home / Scan Input
        - Scan Results (Engineer's Report)
        - Recon Report (Covert Mode)
        - Domain Comparison
        - Scan History
        - Domain Dossier
        - IP Intelligence
        - Email Header Analyzer
        - Zone File Upload
        - Drift / Watchlist
        - About Page
        - Security Policy
        - Admin Panel
        - Badge / Embed
        - Navigation / Layout (Global)
        - PWA / Service Worker
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DNS Tool Version
      description: >
        Which version of DNS Tool showed this issue?
        Check the footer of any page or the /health endpoint.
      placeholder: "e.g., 26.34.54"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & Browser
      description: What device and browser are you using?
      placeholder: "e.g., iPhone 14 / Safari 17, Chrome 122 / Windows 11, Firefox / Ubuntu"
    validations:
      required: true

  - type: input
    id: viewport
    attributes:
      label: Viewport Width (if known)
      description: >
        If you know the viewport width, include it. Mobile issues at 375px
        are the most common class of UI bugs.
      placeholder: "e.g., 375px, 768px, 1440px"
    validations:
      required: false

  - type: dropdown
    id: accessibility
    attributes:
      label: Accessibility Impact
      description: Does this affect accessibility?
      options:
        - No accessibility impact
        - Minor (WCAG AA cosmetic)
        - Moderate (WCAG AA functional)
        - Severe (WCAG AAA or blocking for assistive technology)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the visual or UX issue. What looks wrong or feels broken?
      placeholder: "The button on the results page overlaps the..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Appearance / Behavior
      description: What should it look like or how should it work?
      placeholder: "The button should be aligned with..."
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or Recording
      description: >
        Attach a screenshot or screen recording showing the issue.
        Drag and drop files here.
      placeholder: "Drag and drop screenshot here..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we see this issue?
      placeholder: |
        1. Go to [page]
        2. Resize browser to [width]
        3. Observe [element]
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This is NOT a security vulnerability (use Security Advisory for those)
          required: true
